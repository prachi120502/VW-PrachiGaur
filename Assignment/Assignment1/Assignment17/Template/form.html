<!DOCTYPE html>
<html>
<head>
<title>Form</title>
</head>

<body>

<h2>User Form</h2>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

<form action="/submit" method="POST">

Name:
<input type="text" name="name"><br><br>

Email:
<input type="text" name="email"><br><br>

Password:
<input type="password" name="password"><br><br>

<button type="submit">Submit</button>

</form>

</body>
</html>
